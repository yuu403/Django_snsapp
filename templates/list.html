{% extends 'base.html' %}
{% load static %}

{% block customcss %}
<link rel="stylesheet" href="{% static 'style.css' %}">
{% endblock customcss %}

{% block content %}
<div class="container mt-3">
    {% for item in object_list %}
    <div class="alert alert-success" role="alert">
        <p>タイトル：<a href="{% url 'detail' item.pk %}">{{item.title}}</a></p>
        <p>投稿者：{{item.user.username}}</p>

        {% if item.user != request.user %}
        <button class="follow-btn" {% if item.user in connection.following.all %}following{% endif %}" data-id="{{item.user.pk}}">
            {% if item.user in connection.following.all %}
            フォロー解除
            {% else %}
            フォロー
            {% endif %}
        </button>
        {% endif %}

        <a href="#" class="like-btn" data-id="{{item.pk}}">
            <i class="{% if request.user in item.like.all %}fas{% else %}far{% endif %} fa-heart"></i>
        </a>
        <span class="like-count">{{item.like.count}}</span>
    </div>
    {% endfor %}
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {

        // like
        const likeButtons = document.querySelectorAll('.like-btn');

        likeButtons.forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();

                const postId = this.dataset.id;

                fetch(`/like/${postId}/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                    }
                })
                    .then(response => response.json())
                    .then(data => {
                        const icon = this.querySelector('i');
                        const count = this.nextElementSibling;

                        count.textContent = data.like_count;

                        icon.classList.toggle('fas', data.liked);
                        icon.classList.toggle('far', !data.liked);
                    });
            });
        });

        // follow
        const followBtns = document.querySelectorAll('.follow-btn');

        followBtns.forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();

                const userId = this.dataset.id;

                fetch(`/users/${userId}/follow/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                    }
                })
                    .then(res => res.json())
                    .then(data => {
                        this.textContent = data.followed ? 'フォロー解除' : 'フォロー';
                    });
            });
        });

    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock content %}
